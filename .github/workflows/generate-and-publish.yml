name: Generate and Publish ChurchTools Client

on:
  schedule:
    - cron: '0 2 * * *' # Run daily at 02:00 UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Needed to authenticate againsts nuget 
      contents: write # Needed to push changes to the repo
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          # Since .NET 10 is currently in preview, resolving preview version might be needed
          # depending on setup-dotnet support, but this explicitly requests 10.0.x

      - name: Install Kiota CLI
        run: dotnet tool install --global Microsoft.OpenApi.Kiota

      - name: Run Client Generation
        id: generate
        shell: pwsh
        run: |
          ./scripts/generate-client.ps1

      - name: Check for changes
        id: git-check
        run: |
          git add src/Fegmm.ChurchTools/Generated .openapi-etag
          # Use diff to see if there are any staged changes
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in the generated client."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in the OpenAPI specification / generated code."
          fi

      - name: Bump Version
        if: steps.git-check.outputs.has_changes == 'true'
        shell: pwsh
        run: |
          $csprojPath = "src/Fegmm.ChurchTools/Fegmm.ChurchTools.csproj"
          [xml]$project = Get-Content $csprojPath
          $currentVersion = [version]$project.Project.PropertyGroup.Version
          
          # Increment the build/revision number
          $newVersion = "{0}.{1}.{2}" -f $currentVersion.Major, $currentVersion.Minor, ($currentVersion.Build + 1)
          
          $project.Project.PropertyGroup.Version = $newVersion
          $project.Save($csprojPath)
          Write-Host "Bumped version to $newVersion"
          echo "NEW_VERSION=$newVersion" >> $env:GITHUB_ENV

      - name: Commit and Push Changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/Fegmm.ChurchTools/Fegmm.ChurchTools.csproj
          git commit -m "chore: Auto-update generated Kiota Client (v${{ env.NEW_VERSION }})"
          git push

      - name: Pack NuGet Package
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          dotnet pack src/Fegmm.ChurchTools/Fegmm.ChurchTools.csproj -c Release -o ./artifacts

      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet Package
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          # The NUGET_API_KEY must be stored in the repository secrets
          dotnet nuget push ./artifacts/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
